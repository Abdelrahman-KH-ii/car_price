{% extends 'base.html' %}
{% block title %}Login — CarValue{% endblock %}
{% block extra_head %}
<style>
  .auth-page {
    min-height: calc(100vh - 62px);
    display: flex; align-items: center; justify-content: center;
    padding: 2rem; background: var(--bg2);
  }
  .auth-card {
    width: 100%; max-width: 420px; background: #fff;
    border: 1px solid var(--border); border-radius: 14px;
    padding: 2.5rem; box-shadow: var(--shadow-lg);
  }
  .auth-logo { font-family: 'Syne', sans-serif; font-size: 0.85rem; font-weight: 700; color: var(--text-muted); margin-bottom: 1.8rem; }
  .auth-logo span { color: var(--gold-btn); }
  .auth-title { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800; margin-bottom: 0.35rem; }
  .auth-sub { color: var(--text-muted); font-size: 0.88rem; margin-bottom: 2rem; }
  .field { display: flex; flex-direction: column; gap: 0.38rem; margin-bottom: 1.1rem; }
  label { font-size: 0.8rem; font-weight: 600; color: var(--text); letter-spacing: 0.02em; }
  input[type=text], input[type=password] {
    background: #fff; border: 1.5px solid var(--border); border-radius: 8px;
    padding: 0.7rem 0.95rem; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 0.93rem;
    outline: none; transition: border-color 0.18s, box-shadow 0.18s; width: 100%;
  }
  input::placeholder { color: var(--text-light); }
  input:focus { border-color: var(--gold-border); box-shadow: 0 0 0 3px rgba(201,150,13,0.1); }
  .submit-btn {
    width: 100%; padding: 0.82rem; background: var(--gold-btn); color: #fff;
    border: none; border-radius: 8px; font-family: 'Syne', sans-serif;
    font-weight: 700; font-size: 0.95rem; cursor: pointer;
    transition: background 0.18s, box-shadow 0.18s; margin-top: 0.4rem;
    box-shadow: 0 2px 8px rgba(180,120,0,0.2);
  }
  .submit-btn:hover { background: var(--gold-hover); box-shadow: 0 3px 12px rgba(180,120,0,0.3); }
  .auth-footer { text-align: center; margin-top: 1.4rem; font-size: 0.85rem; color: var(--text-muted); }
  .auth-footer a { color: var(--gold-btn); text-decoration: none; font-weight: 500; }
  .auth-footer a:hover { text-decoration: underline; }
</style>
{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">Car<span>Value</span></div>
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Sign in to continue to Car Value Predictor.</p>
    <form method="post">
      {% csrf_token %}
      <div class="field">
        <label>Username</label>
        <input type="text" name="username" placeholder="your_username" required autocomplete="username">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="submit-btn">Sign In</button>
    </form>
    <p class="auth-footer">Don't have an account? <a href="/accounts/register/">Register</a></p>
  </div>
</div>
{% endblock %}
